name: invoice_app
description: Aplikasi Invoice modern dengan Flutter - Kelola invoice dengan mudah, cepat, dan profesional.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Database
  sqflite: ^2.3.0
  path: ^1.8.3

  # PDF Generation
  pdf: ^3.10.7
  printing: ^5.11.1

  # Sharing
  share_plus: ^7.2.1

  # Date & Number Formatting
  intl: ^0.19.0

  # Shared Preferences (untuk dark mode)
  shared_preferences: ^2.2.2

  # Path Provider (untuk file storage)
  path_provider: ^2.1.1

  # URL Launcher
  url_launcher: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  # Fonts
  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-ExtraBold.ttf
          weight: 800
